name: Maven Package Build\n\non: [push, pull_request]\n\njobs:\n  build:\n    runs-on: ubuntu-latest\n    strategy:\n      matrix:\n        project: [project1, project2, project3]  # replace with your projects\n\n    steps:\n    - name: Checkout code\n      uses: actions/checkout@v2\n\n    - name: Setup JDK\n      uses: actions/setup-java@v1\n      with:\n        java-version: '11'  # replace with your required Java version\n\n    - name: Build with Maven\n      run: mvn package\n