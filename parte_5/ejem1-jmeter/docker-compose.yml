  # Topología Caché en memoria. App ejem2-cache-spring
  # spring-app:
  #   build: ./ejem-2-cache
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/post
  #     - SPRING_DATASOURCE_PASSWORD=root
