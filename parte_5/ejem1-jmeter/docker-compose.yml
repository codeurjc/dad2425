  #       limits:
  #         cpus: '1.0'
  #         memory: 512m

  # Topología balanceador de carga y caché en memoria. App ejem2-cache-redis
  # spring-app: 
  #   build: ./ejem-2-cache
  #   environment:
  #     - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/post
  #     - SPRING_DATASOURCE_PASSWORD=root
  #     - SPRING_DATASOURCE_USERNAME=root
  #   depends_on:
  #     mysql-db:
  #       condition: service_healthy
  #   deploy:
  #     replicas: 3 # Con LB
  #     resources:
  #       limits:
  #         cpus: '1.0'
  #         memory: 512m

  # Topología balanceador de carga y caché en Redis. App ejem2-cache-redis
  spring-app:
    build: ./ejem-2-cache-redis
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql-db:3306/post
      - SPRING_DATASOURCE_PASSWORD=root
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_REDIS_HOST=redis_t3
      - SPRING_REDIS_PORT=6379
    depends_on:
      mysql-db:
        condition: service_healthy
    deploy:
      replicas: 1 # Con LB
      resources:
        limits:
          cpus: '1.0'
          memory: 512m

  haproxy:
    image: haproxy:latest
    container_name: lb_demo
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    ports:
      - "80:80"     # Tráfico de la App
      - "8404:8404" # Estadísticas
    depends_on:
      - spring-app    

  redis:
    image: redis:alpine
    container_name: redis_t3

  # --- MONITORING (PROMETHEUS & GRAFANA) ---
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/:/etc/grafana/provisioning/
    depends_on:
      - prometheus

  # --- CADVISOR ---
  # Si falla con el mensaje "too many open files", hay que aumentar los descriptores de ficheros: `sudo sysctl -w fs.inotify.max_user_instances=8192`
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    privileged: true
    command: --docker_only --disable_metrics=percpu,process,sched,tcp,udp,disk,diskIO
    ports:
      - "8088:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    restart: always