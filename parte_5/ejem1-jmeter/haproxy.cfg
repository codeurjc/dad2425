global
    log stdout format raw local0

defaults
    log     global
    mode    http
    option  httplog
    option  dontlognull
    timeout connect 5000
    timeout client  50000
    timeout server  50000

# --- CONFIGURACIÓN DEL RESOLVER (DNS de Docker) ---
resolvers docker_dns
    nameserver dns1 127.0.0.11:53
    resolve_retries 3
    timeout retry   1s
    hold valid      10s    # Tiempo que considera válida la IP antes de re-consultar

# --- PANEL DE ESTADÍSTICAS ---
frontend stats
    bind *:8404
    stats enable
    stats uri /stats
    stats refresh 5s
    stats admin if LOCALHOST # Permite gestionar servidores desde la web

# --- BALANCEADOR PARA LA APP SPRING ---
frontend http-in
    bind *:80
    default_backend spring_apps

backend spring_apps
    balance roundrobin
    option httpchk GET /actuator/health # Requiere Spring Boot Actuator
    
    # 'init-addr last,libc,none' evita que HAProxy falle si la App aún no ha arrancado
    # 'resolvers docker_dns' activa el descubrimiento dinámico
    server-template app- 6 spring-app:8080 check resolvers docker_dns init-addr last,libc,none
